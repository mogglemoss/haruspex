name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ── Linux ────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run pyinstaller haruspex.spec
      - run: tar -czf dist/haruspex-linux.tar.gz -C dist haruspex
      - uses: actions/upload-artifact@v7
        with:
          name: haruspex-linux
          path: dist/haruspex-linux.tar.gz

  # ── Windows ──────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run pyinstaller haruspex.spec
      - run: Compress-Archive -Path dist/haruspex -DestinationPath dist/haruspex-windows.zip
        shell: pwsh
      - uses: actions/upload-artifact@v7
        with:
          name: haruspex-windows
          path: dist/haruspex-windows.zip

  # ── macOS universal binary (Intel + Apple Silicon) ───────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run pyinstaller haruspex.spec
      - run: tar -czf dist/haruspex-macos.tar.gz -C dist haruspex
      - uses: actions/upload-artifact@v7
        with:
          name: haruspex-macos
          path: dist/haruspex-macos.tar.gz

  # ── Release — only on version tags ──────────────────────────────────────
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: haruspex-{linux,windows,macos}
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2.6.1
        with:
          files: dist/*
          generate_release_notes: true
